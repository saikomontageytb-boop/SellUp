name = "sellup-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# D1 binding
[[d1_databases]]
binding = "DB"
database_name = "sellup-db"
database_id = "77b34768-7b48-4a06-80f9-da399d9b9498"

# Workers AI (free up to 10k neurons/day)
[ai]
binding = "AI"

# R2 binding — activate R2 on your account first, then uncomment + redeploy
# [[r2_buckets]]
# binding = "R2"
# bucket_name = "sellup-files"

# Secrets (set with: wrangler secret put JWT_SECRET)
# [vars]
# JWT_SECRET is set as a SECRET, not a var
